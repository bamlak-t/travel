name: Update trip manifest

on:
  push:
    branches: [main]
    paths:
      - "trips/*.json"

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    # Skip if the commit was made by the bot itself (prevents infinite loop)
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate manifest
        run: python build.py

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trips/index.json
          git diff --staged --quiet || git commit -m "chore: update trip manifest [skip ci]"
          git push
